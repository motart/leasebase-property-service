name: Deploy to Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC
  contents: read
  packages: read     # GitHub Packages (npm install @leasebase/service-common)

env:
  DEPLOY_CONFIG: deploy.dev.json

jobs:
  build-and-deploy:
    name: Build → Scan → Push → Deploy
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js + GitHub Packages auth ───────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@leasebase'

      # ── Install + test + lint ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # ── Docker buildx ───────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── AWS OIDC ────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Install Trivy ──────────────────────────────────────────────────
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      # ── Build, scan, push ──────────────────────────────────────────────
      - name: Build, scan & push to ECR
        id: build
        run: bash scripts/build_push.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Deploy to ECS ──────────────────────────────────────────────────
      - name: Deploy to ECS Dev
        run: bash scripts/deploy_ecs.sh
        env:
          IMAGE: ${{ steps.build.outputs.image }}
